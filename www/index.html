<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Einsatzcockpit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --blue: #3b82f6; --red: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 24px; text-align: center;
    }
    .logo { width: 140px; height: 140px; object-fit: contain; }
    .sub { font-size: .9rem; color: var(--muted); }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px; width: 100%; max-width: 360px;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .card p { font-size: .85rem; color: var(--muted); line-height: 1.5; }
    button {
      width: 100%; border: none; border-radius: 10px; cursor: pointer;
      font-size: .95rem; font-weight: 600; padding: 14px;
      background: var(--blue); color: #fff; margin-top: 16px;
      transition: opacity .15s;
    }
    button:active { opacity: .75; }
    button:disabled { opacity: .45; cursor: default; }
    button.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0 8px; color: var(--muted); font-size: .8rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { color: var(--red); font-size: .85rem; display: none; }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="Einsatzcockpit">
  <div class="sub" id="statusLine">Startet…</div>
  <div class="spinner" id="spinner"></div>

  <!-- Erster Start / kein Token -->
  <div class="card" id="setupCard" style="display:none;">
    <h2>👤 Mit Account anmelden</h2>
    <p>Persönlicher Account (Benutzername/Passwort)</p>
    <button onclick="openAccountLogin()">Mit Account anmelden</button>
    <div class="divider"><span>oder Geräte-Login</span></div>
    <p>Scanne den QR-Code aus dem Admin-Bereich<br>(Admin → Geräte-Login → + Gerät registrieren)</p>
    <button class="btn-secondary" id="scanBtn" onclick="startScan()">QR-Code scannen</button>
    <button class="btn-secondary" onclick="openPinPairing()">PIN eingeben statt scannen</button>
  </div>

  <div id="error"></div>

<script>
// ── Start-Logik ────────────────────────────────────────────────────────────────
// Wartet auf Capacitor-Bridge (asynchron injiziert)
function waitForCapacitor(cb, timeout = 3000) {
  const start = Date.now();
  function check() {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences) {
      cb();
    } else if (Date.now() - start < timeout) {
      setTimeout(check, 100);
    } else {
      // Kein Capacitor – direkt zur PWA (Browser-Fallback)
      window.location.href = 'https://einsatzcockpit.com';
    }
  }
  check();
}

waitForCapacitor(async () => {
  const { Preferences, SmsGateway } = window.Capacitor.Plugins;

  // Beide Rollen sind unabhängig voneinander möglich (kombiniertes Gerät):
  // Gateway läuft immer headless im Hintergrund, das Board ist – falls vorhanden –
  // die Hauptansicht. Nur ohne Geräte-Token bleibt gateway.html die Ansicht.
  const { value: gwUrl }       = await Preferences.get({ key: 'el_gateway_url' });
  const { value: gwToken }     = await Preferences.get({ key: 'el_gateway_token' });
  const { value: deviceToken } = await Preferences.get({ key: 'el_device_token' });
  const hasGateway = !!(gwUrl && gwToken);
  const hasDevice  = !!deviceToken;

  if (hasGateway) {
    setStatus('SMS-Gateway startet…');
    if (SmsGateway) {
      await SmsGateway.startGateway({ url: gwUrl, token: gwToken });
      await ensureBatteryOptimizationOff(SmsGateway);
    }
  }

  if (hasDevice) {
    setStatus('Anmelden…');
    // ForegroundService starten – App-Prozess bleibt im Hintergrund am Leben,
    // auch wenn der Bildschirm ausgeht (Bildschirm darf ausgehen, App nicht)
    const DevKA = window.Capacitor?.Plugins?.DeviceKeepalive;
    if (DevKA) { try { await DevKA.startKeepalive(); } catch (_) {} }
    window.location.replace(
      'https://einsatzcockpit.com/geraet-login?token=' + encodeURIComponent(deviceToken));
    return;
  }

  if (hasGateway) {
    // Reiner Gateway-Modus (kein Board-Login vorhanden) – lokale Statusseite zeigen.
    window.location.replace('gateway.html');
    return;
  }

  // Kein Geraete-/Gateway-Token gespeichert. Falls der Nutzer aber frueher schon
  // einmal "Mit Account anmelden" genutzt hat, liegt evtl. noch eine gueltige
  // Web-Session (Cookie) im WebView-Cookiespeicher. Statt jedes Mal erneut den
  // Setup-Screen zu zeigen, still zur Startseite navigieren – SameSite=Lax-Cookies
  // werden bei einer echten Top-Level-Navigation immer mitgeschickt; der Server
  // zeigt bei ungueltiger/abgelaufener Session ohnehin korrekt /login an
  // (Nutzer-Feedback 2026-07-11: Login-Screen soll nicht erneut erscheinen).
  const { value: usedAccountLogin } = await Preferences.get({ key: 'el_used_account_login' });
  if (usedAccountLogin) {
    setStatus('Anmelden…');
    window.location.replace('https://einsatzcockpit.com/');
    return;
  }

  // Kein Token, keine bekannte Account-Session → QR-Scanner anzeigen
  // (+ Alternativen: PIN, Account-Login)
  setStatus('Anmeldung erforderlich');
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('setupCard').style.display = '';
});

// Akku-Optimierung nur einmalig anfragen (nicht bei jedem Start prompten), damit der
// Gateway-Dienst zuverlässig im Hintergrund weiterläuft.
async function ensureBatteryOptimizationOff(SmsGateway) {
  try {
    if (!SmsGateway.getBatteryOptimizationStatus) return;
    const { ignored } = await SmsGateway.getBatteryOptimizationStatus();
    if (!ignored) {
      await SmsGateway.requestBatteryOptimization();
    }
  } catch (_) { /* Methode optional / Fehler ignorieren, Gateway läuft trotzdem */ }
}

// ── Alternativen zum QR-Scan ─────────────────────────────────────────────────
// Geräte-Pairing per PIN (kein Kamerazugriff nötig) – die Bestätigungsseite
// liefert bei Erfolg selbst einen neuen Geräte-Token zurück und speichert ihn
// per native-bridge.js in den Capacitor-Preferences (siehe geraet_login_pin.html).
function openPinPairing() {
  window.location.replace('https://einsatzcockpit.com/geraet-login-pin');
}

// Persönlicher Account (Benutzername/Passwort) – normale Web-Session statt
// Geräte-Token, hält bis zu 30 Tage bei aktivem "Angemeldet bleiben". Merkt sich,
// dass dieser Weg schon einmal genutzt wurde, damit der Setup-Screen bei einer
// noch gültigen Session beim nächsten App-Start übersprungen werden kann.
async function openAccountLogin() {
  try {
    const { Preferences } = window.Capacitor.Plugins;
    await Preferences.set({ key: 'el_used_account_login', value: '1' });
  } catch (_) { /* Merken ist best-effort, Login funktioniert trotzdem */ }
  window.location.replace('https://einsatzcockpit.com/login');
}

function setStatus(msg) {
  document.getElementById('statusLine').textContent = msg;
}

// ── QR-Scan ────────────────────────────────────────────────────────────────────
async function startScan() {
  const { Preferences, SmsGateway } = window.Capacitor.Plugins;
  const BarcodeScanner = window.Capacitor.Plugins.BarcodeScanner;

  if (!BarcodeScanner) {
    showError('QR-Scanner-Plugin nicht verfügbar.');
    return;
  }

  setStatus('QR-Scanner öffnet…');
  document.getElementById('scanBtn').disabled = true;

  try {
    // Google Barcode Scanner Module prüfen/installieren
    const { available } = await BarcodeScanner.isGoogleBarcodeScannerModuleAvailable();
    if (!available) {
      setStatus('Google-Scanner-Modul wird installiert…');
      await new Promise((resolve, reject) => {
        BarcodeScanner.addListener('googleBarcodeScannerModuleInstallProgress', (e) => {
          if (e.state === 4) resolve();
          else if (e.state === 5) reject(new Error('Modul-Installation fehlgeschlagen'));
        });
        BarcodeScanner.installGoogleBarcodeScannerModule();
      });
    }

    setStatus('QR-Code scannen…');
    const { barcodes } = await BarcodeScanner.scan();
    if (!barcodes || barcodes.length === 0) {
      showError('Kein QR-Code gescannt.');
      return;
    }
    await handleQrResult(barcodes[0].rawValue, Preferences, SmsGateway);
  } catch (e) {
    showError('Scan-Fehler: ' + (e.message || e));
    document.getElementById('scanBtn').disabled = false;
  }
}

const ALLOWED_HOSTS = ['einsatzcockpit.com', 'einsatzleiter.cloud'];

async function handleQrResult(raw, Preferences, SmsGateway) {
  let parsed;
  try { parsed = new URL(raw); }
  catch (_) { showError('Ungültiger QR-Code.'); return; }

  if (!ALLOWED_HOSTS.includes(parsed.hostname)) {
    showError('QR-Code von unbekanntem Server – abgelehnt.');
    return;
  }

  const token       = parsed.searchParams.get('token');
  const mode        = parsed.searchParams.get('mode');
  const gatewayTok  = parsed.searchParams.get('gateway_token');

  if (!token) { showError('QR-Code enthält kein Token.'); return; }

  if (mode === 'unit+sms-gateway') {
    // ── Kombiniertes Gerät: Board-Login UND SMS-Gateway in einem Scan ───────
    if (!gatewayTok) { showError('QR-Code enthält kein Gateway-Token.'); return; }
    const baseUrl = parsed.origin;
    setStatus('Gerät + SMS-Gateway koppeln…');

    await Preferences.set({ key: 'el_gateway_url',   value: baseUrl });
    await Preferences.set({ key: 'el_gateway_token', value: gatewayTok });
    await Preferences.set({ key: 'el_device_token',  value: token });

    if (SmsGateway) {
      const { granted } = await SmsGateway.requestPermission();
      if (!granted) {
        showError('SMS-Berechtigung verweigert – bitte manuell in den App-Einstellungen aktivieren.');
        // Trotzdem fortfahren; Gateway startet headless, SMS schlägt fehl bis berechtigt
      }
      await SmsGateway.startGateway({ url: baseUrl, token: gatewayTok });
      await ensureBatteryOptimizationOff(SmsGateway);
    }
    // Board ist die Hauptansicht; Gateway läuft ab jetzt im Hintergrund weiter.
    setStatus('Anmelden…');
    window.location.replace(`${baseUrl}/geraet-login?token=${encodeURIComponent(token)}`);

  } else if (mode === 'sms-gateway') {
    // ── Gateway-Modus ──────────────────────────────────────────────────────
    const baseUrl = parsed.origin;
    setStatus('SMS-Gateway konfigurieren…');

    await Preferences.set({ key: 'el_gateway_url',   value: baseUrl });
    await Preferences.set({ key: 'el_gateway_token', value: token });

    if (SmsGateway) {
      // Berechtigung anfragen
      const { granted } = await SmsGateway.requestPermission();
      if (!granted) {
        showError('SMS-Berechtigung verweigert – bitte manuell in den App-Einstellungen aktivieren.');
        // Trotzdem fortfahren; Service startet, aber SMS schlägt fehl bis berechtigt
      }
      await SmsGateway.startGateway({ url: baseUrl, token });
    }
    window.location.replace('gateway.html');

  } else {
    // ── Einheit-Gerät-Modus ────────────────────────────────────────────────
    setStatus('Anmelden…');
    await Preferences.set({ key: 'el_device_token', value: token });
    window.location.replace(
      `${parsed.origin}/geraet-login?token=${encodeURIComponent(token)}`);
  }
}

function showError(msg) {
  setStatus('Fehler');
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = '';
  document.getElementById('scanBtn').disabled = false;
}
</script>
</body>
</html>
