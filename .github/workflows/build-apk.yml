name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_FILE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Capacitor Add & Sync
        run: |
          npx cap add android
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Generate app icons from Logo-rot.png
        run: |
          cp assets/Logo-rot.png assets/icon.png
          cp assets/Logo-rot.png assets/icon-foreground.png
          npx capacitor-assets generate --android

      - name: Write google-services.json
        run: |
          SECRET='${{ secrets.GOOGLE_SERVICES_JSON }}'
          if [ -n "$SECRET" ] && echo "$SECRET" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "$SECRET" > android/app/google-services.json
          else
            # Platzhalter: APK baut durch, FCM-Push funktioniert erst nach echtem Secret
            cat > android/app/google-services.json <<'PLACEHOLDER'
          {
            "project_info": { "project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com" },
            "client": [{
              "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "cloud.einsatzleiter.app" } },
              "oauth_client": [], "api_key": [{ "current_key": "placeholder" }], "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          PLACEHOLDER
            echo "GOOGLE_SERVICES_JSON secret nicht gesetzt - Platzhalter verwendet (FCM inaktiv)"
          fi

      - name: Patch AndroidManifest (Standort-Berechtigungen)
        run: |
          python3 - <<'EOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, encoding="utf-8") as f:
              content = f.read()

          PERMISSIONS = [
              "android.permission.ACCESS_COARSE_LOCATION",
              "android.permission.ACCESS_FINE_LOCATION",
              "android.permission.ACCESS_BACKGROUND_LOCATION",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.FOREGROUND_SERVICE_LOCATION",
          ]

          added = []
          for perm in PERMISSIONS:
              tag = f'<uses-permission android:name="{perm}" />'
              if perm not in content:
                  content = content.replace("</manifest>", f"    {tag}\n</manifest>")
                  added.append(perm)

          gps_feature = '<uses-feature android:name="android.hardware.location.gps" android:required="false" />'
          if "android.hardware.location.gps" not in content:
              content = content.replace("</manifest>", f"    {gps_feature}\n</manifest>")
              added.append("hardware.location.gps")

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)

          print("Hinzugefuegt:" if added else "Alle Berechtigungen vorhanden.", added)
          EOF

      - name: Build APK
        working-directory: android
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            echo "Release-Build"
            ./gradlew assembleRelease
          else
            echo "Kein Keystore-Secret - Debug-APK (sideloadbar)"
            ./gradlew assembleDebug
          fi

      - name: Sign Release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > /tmp/keystore.jks
          chmod 600 /tmp/keystore.jks
          echo "=== Keystore Diagnose ==="
          ls -la /tmp/keystore.jks
          keytool -list -keystore /tmp/keystore.jks -storepass "$KEYSTORE_PASSWORD" -v 2>&1 | head -20
          echo "=== Alias prüfen ==="
          printf '%s' "$KEY_ALIAS" | xxd | head -3
          echo "========================"
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" | sort -V | tail -1)
          "$APKSIGNER" sign \
            --ks /tmp/keystore.jks \
            --ks-pass "env:KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "env:KEY_PASSWORD" \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f /tmp/keystore.jks

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: einsatzleiter.apk
          path: |
            android/app/build/outputs/apk/release/app-release-signed.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release (nur auf Tags mit Keystore)
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.HAS_KEYSTORE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release-signed.apk
          name: einsatzleiter.cloud ${{ github.ref_name }}
          body: |
            ## Installation
            1. APK-Datei auf das Android-Gerät übertragen
            2. Einstellungen → Sicherheit → "Unbekannte Quellen" erlauben
            3. APK installieren
            4. App starten → QR-Code aus dem Admin-Bereich scannen (Admin → Geräte-Login)
